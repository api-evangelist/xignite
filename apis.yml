aid: xignite
url: https://raw.githubusercontent.com/api-evangelist/xignite/refs/heads/main/apis.yml
name: Xignite
kind: company
description: Xignite pioneered cloud-based financial market data APIs, offering a catalog of 40+ REST
  web services covering equities, forex, crypto, indices, options, futures, fixed income, mutual funds,
  corporate actions, news, ESG, and reference data. Each API lives on its own subdomain (for example globalquotes.xignite.com)
  and returns JSON, XML, or CSV, with bulk datasets delivered as files via CloudFiles and streaming quotes
  via its CloudStreaming product. Founded in 2000, Xignite was acquired by QUODD (a NewSpring Holdings
  company) in February 2023; the xignite.com developer catalog remains live while corporate pages redirect
  to quodd.com, and QUODD runs a newer developer platform at developer.quodd.com.
